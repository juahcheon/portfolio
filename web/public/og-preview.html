<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px;
    gap: 12px;
    font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
  }
  p { color: #666; font-size: 12px; }
</style>
</head>
<body>
<p>OG Image Preview — 1200 × 630</p>

<div id="og" style="width:1200px; height:630px; background:#5f9ea0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0;">

  <!-- 반전 로고: 흰 육각형 + 포인트컬러 >_ -->
  <svg width="190" height="190" viewBox="0 0 32 32">
    <polygon points="31,16 23.5,3 8.5,3 1,16 8.5,29 23.5,29" fill="white"/>
    <text x="7" y="14" dominant-baseline="central"
          fill="#5f9ea0"
          font-family="Consolas,'Courier New',monospace"
          font-size="13" font-weight="700">&gt;_</text>
  </svg>

  <div style="font-family:'Pretendard','Malgun Gothic',sans-serif; font-size:76px; font-weight:800; color:white; line-height:1; letter-spacing:-3px; margin-top:22px;">천주아</div>

  <div style="margin-top:14px; display:flex; align-items:center; gap:14px;">
    <div style="font-family:'Pretendard','Malgun Gothic',sans-serif; font-size:22px; font-weight:500; color:rgba(255,255,255,0.9);">포트폴리오</div>
    <div style="width:4px; height:4px; background:rgba(255,255,255,0.5); border-radius:50%;"></div>
    <div style="font-family:'Pretendard','Malgun Gothic',sans-serif; font-size:22px; font-weight:400; color:rgba(255,255,255,0.75);">웹 프론트엔드 개발자</div>
  </div>

</div>
</body>
</html>
